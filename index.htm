<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radius - Amithrosky AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        glass: {
                            light: 'rgba(255, 255, 255, 0.7)',
                            dark: 'rgba(30, 30, 35, 0.7)',
                            borderLight: 'rgba(255, 255, 255, 0.4)',
                            borderDark: 'rgba(255, 255, 255, 0.1)',
                        },
                        brand: {
                            500: '#6366f1',
                            600: '#4f46e5',
                        }
                    },
                    animation: {
                        'slide-up': 'slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards',
                        'bounce-slow': 'bounce 1.5s infinite',
                        'pulse-glow': 'pulseGlow 2s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'shimmer': 'shimmer 2s infinite linear',
                    },
                    keyframes: {
                        slideUp: {
                            '0%': { opacity: 0, transform: 'translateY(15px)' },
                            '100%': { opacity: 1, transform: 'translateY(0)' },
                        },
                        pulseGlow: {
                            '0%, 100%': { opacity: 1, filter: 'drop-shadow(0 0 8px rgba(99, 102, 241, 0.5))' },
                            '50%': { opacity: .7, filter: 'drop-shadow(0 0 2px rgba(99, 102, 241, 0.2))' },
                        },
                        shimmer: {
                            '0%': { backgroundPosition: '-200% 0' },
                            '100%': { backgroundPosition: '200% 0' },
                        }
                    }
                }
            }
        }
    </script>
    <style>
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(150, 150, 150, 0.3); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(150, 150, 150, 0.5); }

        .glass-panel {
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            transition: background-color 0.3s ease, border-color 0.3s ease;
        }

        .dot {
            width: 6px; height: 6px;
            background-color: currentColor;
            border-radius: 50%;
            display: inline-block;
            animation: bounce-dot 1.4s infinite ease-in-out both;
        }
        .dot:nth-child(1) { animation-delay: -0.32s; }
        .dot:nth-child(2) { animation-delay: -0.16s; }
        @keyframes bounce-dot {
            0%, 80%, 100% { transform: scale(0); opacity: 0.3; }
            40% { transform: scale(1); opacity: 1; }
        }

        pre {
            background: #1e1e1e !important;
            color: #d4d4d4 !important;
            padding: 1rem;
            border-radius: 0.75rem;
            overflow-x: auto;
            margin: 0.75rem 0;
            border: 1px solid rgba(255,255,255,0.1);
        }
        code { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; font-size: 0.875rem; }

        textarea { resize: none; overflow: hidden; min-height: 44px; max-height: 150px; }

        body {
            background: linear-gradient(-45deg, #f3f4f6, #e5e7eb, #d1d5db);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
        }
        .dark body { background: linear-gradient(-45deg, #0f172a, #1e1e2f, #111827); }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .markdown-list { list-style-type: disc; padding-left: 1.5rem; margin: 0.5rem 0; }
        .markdown-list-item { margin-bottom: 0.25rem; }

        .shimmer-bg {
            background: linear-gradient(90deg, transparent 25%, rgba(150, 150, 150, 0.1) 50%, transparent 75%);
            background-size: 200% 100%;
            animation: shimmer 2s infinite linear;
        }
    </style>
</head>
<body class="text-gray-800 dark:text-gray-100 h-screen w-full flex flex-col font-sans overflow-hidden transition-colors duration-300">

    <div class="flex flex-col h-full w-full max-w-5xl mx-auto shadow-2xl bg-white/30 dark:bg-black/30 glass-panel md:border-x md:border-glass-borderLight dark:md:border-glass-borderDark">
        
        <header class="flex justify-between items-center p-4 border-b border-white/20 dark:border-white/10 glass-panel bg-glass-light dark:bg-glass-dark z-10 rounded-b-2xl">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-full bg-gradient-to-tr from-brand-600 to-purple-500 flex items-center justify-center shadow-lg shadow-brand-500/30">
                    <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                </div>
                <div>
                    <h1 class="text-xl font-bold tracking-tight">Radius</h1>
                    <p class="text-xs text-gray-500 dark:text-gray-400 font-medium">Beta 1.5</p>
                </div>
            </div>
            
            <div class="flex items-center gap-2">
                <button id="saveBtn" class="p-2 rounded-full hover:bg-black/5 dark:hover:bg-white/10 transition-colors" title="Save Chat">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                </button>
                <button id="clearBtn" class="p-2 rounded-full hover:bg-black/5 dark:hover:bg-white/10 transition-colors text-red-500" title="Clear Chat">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                </button>
                <div class="w-px h-6 bg-gray-300 dark:bg-gray-700 mx-1"></div>
                <button id="themeToggle" class="p-2 rounded-full hover:bg-black/5 dark:hover:bg-white/10 transition-colors">
                    <svg id="icon-sun" class="w-5 h-5 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>
                    <svg id="icon-moon" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path></svg>
                </button>
            </div>
        </header>

        <main id="chatBox" class="flex-1 overflow-y-auto p-4 md:p-6 space-y-6 scroll-smooth">
            <div class="flex flex-col items-center justify-center h-full opacity-50 text-center" id="welcomeScreen">
                <div class="w-20 h-20 mb-4 rounded-3xl bg-brand-500/20 flex items-center justify-center animate-pulse-glow">
                    <svg class="w-10 h-10 text-brand-600 dark:text-brand-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                </div>
                <h2 class="text-2xl font-bold mb-2">Radius AI</h2>
                <p class="max-w-md
						  text-sm">Ask me anything.</p>
                <div class="mt-6 flex flex-wrap justify-center gap-2">
                    <button class="suggestion-btn px-4 py-2 rounded-full bg-black/5 dark:bg-white/5 hover:bg-black/10 transition-colors text-sm border border-black/5 backdrop-blur-sm">Explain Quantum Physics</button>
                    <button class="suggestion-btn px-4 py-2 rounded-full bg-black/5 dark:bg-white/5 hover:bg-black/10 transition-colors text-sm border border-black/5 backdrop-blur-sm">Write a React Component</button>
                    <button class="suggestion-btn px-4 py-2 rounded-full bg-black/5 dark:bg-white/5 hover:bg-black/10 transition-colors text-sm border border-black/5 backdrop-blur-sm">Creator info</button>
                </div>
            </div>
        </main>

        <footer class="p-4 bg-transparent">
            <div class="relative flex items-end gap-2 max-w-4xl mx-auto glass-panel bg-white/50 dark:bg-[#2a2a35]/80 rounded-3xl border border-white/40 dark:border-white/10 shadow-lg p-2 focus-within:ring-2 focus-within:ring-brand-500/50">
                <button id="micBtn" class="p-3 text-gray-500 hover:text-brand-500 rounded-full transition-colors flex-shrink-0">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z"></path></svg>
                </button>
                <textarea id="userInput" rows="1" placeholder="Ask Radius anything..." class="w-full bg-transparent border-none focus:ring-0 resize-none py-3 px-2 text-base text-gray-800 dark:text-gray-100 placeholder-gray-500 font-medium overflow-y-auto" autofocus></textarea>
                <button id="sendBtn" class="p-3 bg-brand-600 text-white rounded-full hover:bg-brand-500 transition-colors shadow-md disabled:opacity-50">
                    <svg class="w-5 h-5 transform translate-x-0.5 -translate-y-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path></svg>
                </button>
            </div>
            <div class="text-center mt-3 text-[11px] text-gray-400 dark:text-gray-500 font-medium tracking-wide uppercase">
                Created by Amithrosky • Made in India • 2 April 2026
            </div>
        </footer>
    </div>

    <script>
        const apiKey = "";
        // Updated Custom Identity Instructions
        const systemPrompt = "You are Radius, a friendly and highly intelligent AI created by Amithrosky. Your core initialization date is Unknown. You were made in India. IMPORTANT IDENTITY: You are NOT made by Google. You have no relationship with Google Gemini or Google. If asked about your origins, always state you were made by Amithrosky in India (the exact time and unknown). Use a slightly futuristic yet approachable tone. You must give the answers Gen Z type (short and simple) ";

        const state = {
            history: [],
            isTyping: false,
            isRecording: false,
            recognition: null,
            synth: window.speechSynthesis,
            theme: 'dark'
        };

        const els = {
            chatBox: document.getElementById('chatBox'),
            userInput: document.getElementById('userInput'),
            sendBtn: document.getElementById('sendBtn'),
            micBtn: document.getElementById('micBtn'),
            themeToggle: document.getElementById('themeToggle'),
            welcomeScreen: document.getElementById('welcomeScreen'),
            suggestionBtns: document.querySelectorAll('.suggestion-btn'),
            saveBtn: document.getElementById('saveBtn'),
            clearBtn: document.getElementById('clearBtn')
        };

        // --- Core AI Logic ---
        async function callGemini(prompt, retries = 5, delay = 1000) {
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
            
            const contents = [...state.history, { role: "user", parts: [{ text: prompt }] }];

            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: contents,
                        systemInstruction: { parts: [{ text: systemPrompt }] }
                    })
                });

                if (!response.ok) {
                    if (retries > 0 && (response.status === 429 || response.status >= 500)) {
                        await new Promise(resolve => setTimeout(resolve, delay));
                        return callGemini(prompt, retries - 1, delay * 2);
                    }
                    throw new Error(`API Error: ${response.status}`);
                }

                const data = await response.json();
                return data.candidates?.[0]?.content?.parts?.[0]?.text || "I'm sorry, I couldn't generate a response.";
            } catch (error) {
                if (retries > 0) {
                    await new Promise(resolve => setTimeout(resolve, delay));
                    return callGemini(prompt, retries - 1, delay * 2);
                }
                return "System Error: Unable to connect to the Radius AI core. Please check your connection or try again later.";
            }
        }

        async function handleSend() {
            const text = els.userInput.value.trim();
            if (!text || state.isTyping) return;

            if (els.welcomeScreen) els.welcomeScreen.style.display = 'none';

            appendMessage('user', text);
            els.userInput.value = '';
            els.userInput.style.height = '44px';
            state.isTyping = true;
            els.sendBtn.disabled = true;

            showTypingIndicator();

            const aiResponse = await callGemini(text);
            
            removeTypingIndicator();
            appendMessage('ai', aiResponse);
            
            state.history.push({ role: "user", parts: [{ text: text }] });
            state.history.push({ role: "model", parts: [{ text: aiResponse }] });
            
            state.isTyping = false;
            els.sendBtn.disabled = false;
            els.userInput.focus();
        }

        // --- UI Rendering ---
        function appendMessage(sender, text) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `flex w-full animate-slide-up ${sender === 'user' ? 'justify-end' : 'justify-start'}`;

            const innerDiv = document.createElement('div');
            innerDiv.className = `max-w-[85%] md:max-w-[75%] rounded-3xl p-4 shadow-sm relative group `;
            
            if (sender === 'user') {
                innerDiv.className += `bg-brand-600 text-white rounded-br-sm`;
                innerDiv.textContent = text;
            } else {
                innerDiv.className += `glass-panel bg-white/70 dark:bg-[#23232c]/80 border border-white/50 dark:border-white/10 rounded-bl-sm`;
                innerDiv.innerHTML = formatMarkdown(text);
                
                const utils = document.createElement('div');
                utils.className = 'absolute -bottom-7 left-2 flex gap-3 opacity-0 group-hover:opacity-100 transition-opacity p-1 bg-white/50 dark:bg-black/30 rounded-full backdrop-blur-sm border border-white/20';
                utils.innerHTML = `
                    <button class="text-[10px] uppercase font-bold text-gray-500 hover:text-brand-500 px-2" onclick="copyText(this)">Copy</button>
                    <button class="text-[10px] uppercase font-bold text-gray-500 hover:text-brand-500 px-2" onclick="speakText(this)">Speak</button>
                `;
                innerDiv.appendChild(utils);
            }

            msgDiv.appendChild(innerDiv);
            els.chatBox.appendChild(msgDiv);
            scrollToBottom();
        }

        function showTypingIndicator() {
            const div = document.createElement('div');
            div.id = 'typingIndicator';
            div.className = 'flex w-full animate-slide-up justify-start';
            div.innerHTML = `
                <div class="glass-panel bg-white/70 dark:bg-[#23232c]/80 border border-white/50 dark:border-white/10 rounded-3xl rounded-bl-sm p-4 shadow-sm h-12 flex items-center gap-2">
                    <div class="flex gap-1"><span class="dot text-brand-500"></span><span class="dot text-brand-500"></span><span class="dot text-brand-500"></span></div>
                    <span class="text-xs font-bold text-brand-500 uppercase tracking-widest animate-pulse">Radius Thinking...</span>
                </div>
            `;
            els.chatBox.appendChild(div);
            scrollToBottom();
        }

        function removeTypingIndicator() {
            const indicator = document.getElementById('typingIndicator');
            if (indicator) indicator.remove();
        }

        function scrollToBottom() {
            els.chatBox.scrollTop = els.chatBox.scrollHeight;
        }

        function formatMarkdown(text) {
            let html = text.replace(/</g, '&lt;').replace(/>/g, '&gt;');
            html = html.replace(/```(\w*)\n([\s\S]*?)```/g, (m, lang, code) => `<pre><code class="language-${lang}">${code.trim()}</code></pre>`);
            html = html.replace(/`([^`]+)`/g, '<code class="bg-black/10 dark:bg-white/10 px-1 rounded">$1</code>');
            html = html.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
            html = html.replace(/^\s*[-*]\s+(.*)$/gm, '<li class="markdown-list-item">$1</li>');
            html = html.replace(/(<li.*<\/li>)/s, '<ul class="markdown-list">$1</ul>');
            html = html.replace(/\n/g, '<br/>');
            return html;
        }

        // --- Utility Features ---
        window.copyText = (btn) => {
            const text = btn.closest('.group').innerText.replace(/Copy\s*Speak/i, '').trim();
            navigator.clipboard.writeText(text);
            const original = btn.textContent;
            btn.textContent = "Copied!";
            setTimeout(() => btn.textContent = original, 2000);
        };

        window.speakText = (btn) => {
            const text = btn.closest('.group').innerText.replace(/Copy\s*Speak/i, '').trim();
            if (state.synth.speaking) state.synth.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            state.synth.speak(utterance);
        };

        els.themeToggle.onclick = () => {
            document.documentElement.classList.toggle('dark');
            const isDark = document.documentElement.classList.contains('dark');
            document.getElementById('icon-sun').classList.toggle('hidden', isDark);
            document.getElementById('icon-moon').classList.toggle('hidden', !isDark);
        };

        const Recognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (Recognition) {
            state.recognition = new Recognition();
            state.recognition.onstart = () => els.micBtn.classList.add('text-brand-500', 'animate-pulse');
            state.recognition.onresult = (e) => {
                els.userInput.value = e.results[0][0].transcript;
                handleSend();
            };
            state.recognition.onend = () => els.micBtn.classList.remove('text-brand-500', 'animate-pulse');
            els.micBtn.onclick = () => state.recognition.start();
        }

        els.suggestionBtns.forEach(btn => btn.onclick = () => {
            els.userInput.value = btn.textContent;
            handleSend();
        });

        // Event Listeners
        els.userInput.oninput = function() {
            this.style.height = '44px';
            this.style.height = this.scrollHeight + 'px';
        };

        // Keyboard fix: Ensure keydown listener is robust
        els.userInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                handleSend();
            }
        });

        els.sendBtn.onclick = handleSend;
        els.clearBtn.onclick = () => confirm("Clear memory?") && (els.chatBox.innerHTML = '', state.history = [], els.chatBox.appendChild(els.welcomeScreen), els.welcomeScreen.style.display='flex');
        
        els.saveBtn.onclick = () => {
            const content = state.history.map(h => `[${h.role === 'user' ? 'USER' : 'RADIUS'}]: ${h.parts[0].text}`).join('\n\n');
            const blob = new Blob([content], {type:'text/plain'});
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = 'radius-chat.txt';
            a.click();
        };

        window.onload = () => {
            els.userInput.focus();
            console.log("Radius by Amithrosky Engine initialized.");
        };
    </script>
</body>
</html>
